name: Web Build Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: npm install --legacy-peer-deps --include=dev
      - name: Build
        run: npx vite build 2>&1
        env:
          NODE_ENV: development
