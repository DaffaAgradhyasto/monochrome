name: Web Build Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: npm install --legacy-peer-deps --include=dev
      - name: Check vite version
        run: ./node_modules/.bin/vite --version
      - name: Build (verbose)
        run: |
          set -x
          node --version
          ./node_modules/.bin/vite build || (echo "BUILD FAILED with exit $?" && exit 1)
        env:
          NODE_ENV: development
          DEBUG: vite:*
