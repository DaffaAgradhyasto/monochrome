<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Monochrome Admin</title>
        <style>
            :root {
                color-scheme: dark;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                font-family: Inter, system-ui, sans-serif;
                background: #111;
                color: #f4f4f4;
            }
            .admin-layout {
                display: grid;
                grid-template-columns: 260px 1fr;
                min-height: 100vh;
            }
            .admin-sidebar {
                background: #1a1a1a;
                border-right: 1px solid #2b2b2b;
                padding: 18px;
            }
            .admin-sidebar h1 {
                margin: 0 0 14px;
                color: #ff4444;
                font-size: 1.2rem;
            }
            .admin-sidebar p {
                margin: 0;
                color: #cfcfcf;
                font-size: 0.9rem;
            }
            .admin-main {
                padding: 20px;
            }
            .admin-tabs {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-bottom: 14px;
            }
            .admin-tab,
            .btn-secondary,
            .btn-primary {
                border: 1px solid #383838;
                background: #222;
                color: #eee;
                border-radius: 10px;
                padding: 8px 12px;
                cursor: pointer;
            }
            .admin-tab.active,
            .btn-primary {
                background: #ff4444;
                border-color: #ff4444;
                color: #fff;
            }
            .admin-card {
                background: #1a1a1a;
                border: 1px solid #2f2f2f;
                border-radius: 12px;
                padding: 14px;
                margin-bottom: 12px;
            }
            .admin-grid {
                display: grid;
                gap: 12px;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            }
            .admin-grid.two {
                grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            }
            .admin-kpi {
                font-size: 1.7rem;
                margin: 0;
                color: #ff4444;
            }
            .admin-toolbar {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-bottom: 10px;
            }
            input,
            select {
                background: #121212;
                border: 1px solid #333;
                color: #eee;
                padding: 8px 10px;
                border-radius: 8px;
            }
            .admin-table-scroll {
                overflow: auto;
            }
            .admin-table {
                width: 100%;
                border-collapse: collapse;
                min-width: 960px;
            }
            .admin-table th,
            .admin-table td {
                border-bottom: 1px solid #2d2d2d;
                text-align: left;
                padding: 10px;
                vertical-align: top;
            }
            .admin-simple-list {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .admin-simple-list li,
            .admin-list-row {
                display: flex;
                justify-content: space-between;
                gap: 8px;
                align-items: center;
                background: #141414;
                border: 1px solid #252525;
                border-radius: 8px;
                padding: 8px 10px;
            }
            .admin-inline-form {
                display: flex;
                gap: 8px;
                margin-bottom: 8px;
            }
            .admin-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
            .admin-tag {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 6px 10px;
                border-radius: 999px;
                border: 1px solid #333;
                background: #202020;
            }
            .admin-tag button {
                border: 0;
                background: transparent;
                color: #ff4444;
                font-size: 1.1rem;
                cursor: pointer;
            }
            .admin-switch-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 6px 0;
            }
            @media (max-width: 960px) {
                .admin-layout {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <div id="admin-dashboard-shell" class="admin-layout">
            <aside class="admin-sidebar">
                <h1>Monochrome Admin</h1>
                <p>Access limited to admin and developer roles.</p>
            </aside>
            <main class="admin-main">
                <div id="admin-tab-nav" class="admin-tabs"></div>
                <div id="admin-tab-content"></div>
            </main>
        </div>

        <script type="module" src="/js/admin/dashboard.js"></script>
    </body>
</html>
