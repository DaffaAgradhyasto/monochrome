<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connecting Spotify...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 1.5rem;
    }
    .logo { font-size: 2rem; font-weight: 700; letter-spacing: -0.05em; }
    .logo span { color: #1DB954; }
    .status {
      font-size: 1rem;
      color: #aaa;
      text-align: center;
      max-width: 400px;
      line-height: 1.5;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #1DB954;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #ff4444; }
    .success { color: #1DB954; }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #1DB954;
      color: #000;
      font-weight: 600;
      border-radius: 100px;
      text-decoration: none;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="logo">Mono<span>chrome</span></div>
  <div class="spinner" id="spinner"></div>
  <p class="status" id="status">Connecting your Spotify account...</p>

  <script type="module">
    import { spotifyAuth } from '/js/spotify-auth.js';

    const statusEl = document.getElementById('status');
    const spinnerEl = document.getElementById('spinner');

    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');

      if (error) {
        spinnerEl.style.display = 'none';
        statusEl.className = 'status error';
        statusEl.innerHTML = `Spotify login was cancelled or failed.<br><small>${error}</small><br><a class="btn" href="/">Go Back</a>`;
        return;
      }

      if (!code) {
        spinnerEl.style.display = 'none';
        statusEl.className = 'status error';
        statusEl.innerHTML = 'No authorization code received.<br><a class="btn" href="/">Go Back</a>';
        return;
      }

      try {
        await spotifyAuth.handleCallback(code);
        const profile = spotifyAuth.getUserProfile();

        spinnerEl.style.display = 'none';
        statusEl.className = 'status success';
        statusEl.innerHTML = `
          Connected as <strong>${profile?.displayName || 'Spotify User'}</strong>!<br>
          <small>Your Spotify history will now power personalized mixes.</small><br>
          <a class="btn" href="/">Back to Monochrome</a>
        `;

        // Auto-redirect after 2 seconds
        setTimeout(() => { window.location.href = '/'; }, 2000);
      } catch (e) {
        spinnerEl.style.display = 'none';
        statusEl.className = 'status error';
        statusEl.innerHTML = `Failed to connect Spotify.<br><small>${e.message}</small><br><a class="btn" href="/">Try Again</a>`;
        console.error('Spotify callback error:', e);
      }
    }

    handleCallback();
  </script>
</body>
</html>
